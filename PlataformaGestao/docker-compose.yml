services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: plataforma-app
    working_dir: /var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-plataforma}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - plataforma

  nginx:
    image: nginx:1.27-alpine
    container_name: plataforma-nginx
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - plataforma

  node:
    image: node:24.13.0-alpine
    container_name: plataforma-node
    working_dir: /var/www/html
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    networks:
      - plataforma

  db:
    image: mysql:8.4
    container_name: plataforma-db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-plataforma}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - plataforma

volumes:
  db_data:

networks:
  plataforma:
    driver: bridge
